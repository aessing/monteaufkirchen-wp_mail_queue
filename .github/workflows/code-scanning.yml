name: Code Scanning

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '23 4 * * 1'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  codeql-actions:
    name: CodeQL (GitHub Actions)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read
    steps:
      - name: Checkout
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: actions
          queries: security-extended

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:actions"

  psalm-php:
    name: Psalm (PHP)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: psalm, composer
          coverage: none

      - name: Create minimal Psalm config
        run: |
          if [ ! -f psalm.xml ] && [ ! -f psalm.xml.dist ]; then
            cat > psalm.xml <<'EOF'
          <?xml version="1.0"?>
          <psalm
              errorLevel="4"
              findUnusedBaselineEntry="false"
              findUnusedCode="false"
              resolveFromConfigFile="true"
              xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"
              xmlns="https://getpsalm.org/schema/config"
              xsi:schemaLocation="https://getpsalm.org/schema/config vendor/vimeo/psalm/config.xsd"
          >
              <projectFiles>
                  <directory name="includes" />
                  <file name="monte-mail-queue-throttle.php" />
                  <file name="uninstall.php" />
              </projectFiles>
          </psalm>
          EOF
          fi

      - name: Run Psalm with security analysis
        run: psalm --no-progress --report=psalm.sarif --output-format=sarif --taint-analysis || true

      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: psalm.sarif
          category: psalm

  stylelint-css:
    name: Stylelint (CSS)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Stylelint
        run: |
          npm init -y >/dev/null 2>&1
          npm install --no-save \
            stylelint@^16 \
            stylelint-config-standard@^36 \
            @microsoft/eslint-formatter-sarif@^3 \
            stylelint-sarif-formatter@^1

      - name: Create Stylelint config if missing
        run: |
          if [ ! -f .stylelintrc.json ] && [ ! -f .stylelintrc ] && [ ! -f stylelint.config.js ]; then
            echo '{"extends":"stylelint-config-standard","rules":{}}' > .stylelintrc.json
          fi

      - name: Run Stylelint
        run: |
          npx stylelint "**/*.css" \
            --custom-formatter=node_modules/stylelint-sarif-formatter \
            --output-file stylelint.sarif || true

      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: stylelint.sarif
          category: stylelint

  validate-dependabot:
    name: Validate Dependabot config
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0

      - name: Validate .github/dependabot.yml
        uses: mschmieder/action-validator@v1
        with:
          schema: https://json.schemastore.org/dependabot-2.0.json
          file: .github/dependabot.yml
