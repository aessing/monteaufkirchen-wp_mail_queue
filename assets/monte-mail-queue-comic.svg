	<g filter="url(#pop)">
		<path d="M111 92h180c28 0 50 22 50 50v34c0 28-22 50-50 50h-69l-45 48v-48h-66c-28 0-50-22-50-50v-34c0-28 22-50 50-50z" fill="#ffffff" stroke="#26384f" stroke-width="6"/>
		<text x="202" y="145" text-anchor="middle" font-family="Arial Black, Arial, sans-serif" font-size="28" fill="#26384f">25/min</text>
		<text x="202" y="181" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" fill="#5c6f86">not 2500</text>
