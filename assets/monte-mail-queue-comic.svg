<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
	<title id="title">Monte Mail Queue Throttle comic illustration</title>
	<desc id="desc">A playful 3D comic post office scene overloaded with mail while a stressed mail carrier slows delivery with a throttle lever.</desc>
	<defs>
		<linearGradient id="sky" x1="0" x2="1" y1="0" y2="1">
			<stop offset="0" stop-color="#eaf8ff"/>
			<stop offset="0.55" stop-color="#f7fbff"/>
			<stop offset="1" stop-color="#fff0d8"/>
		</linearGradient>
		<linearGradient id="roof" x1="0" x2="1">
			<stop offset="0" stop-color="#d44837"/>
			<stop offset="1" stop-color="#8f1f28"/>
		</linearGradient>
		<linearGradient id="wall" x1="0" x2="0" y1="0" y2="1">
			<stop offset="0" stop-color="#fff3d0"/>
			<stop offset="1" stop-color="#f1b86d"/>
		</linearGradient>
		<linearGradient id="mail" x1="0" x2="1" y1="0" y2="1">
			<stop offset="0" stop-color="#ffffff"/>
			<stop offset="1" stop-color="#dceaff"/>
		</linearGradient>
		<filter id="shadow" x="-30%" y="-30%" width="160%" height="170%">
			<feDropShadow dx="0" dy="14" stdDeviation="12" flood-color="#29415f" flood-opacity="0.24"/>
		</filter>
		<filter id="pop" x="-20%" y="-20%" width="140%" height="140%">
			<feDropShadow dx="0" dy="8" stdDeviation="5" flood-color="#1d2b44" flood-opacity="0.22"/>
		</filter>
	</defs>

	<rect width="1200" height="720" fill="url(#sky)"/>
	<ellipse cx="610" cy="646" rx="470" ry="46" fill="#c9d7e8" opacity="0.42"/>

	<g opacity="0.5">
